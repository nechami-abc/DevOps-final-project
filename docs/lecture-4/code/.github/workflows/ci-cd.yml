name: Build, Push and Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/backend/**"
      - "app/frontend/**"
      - ".github/workflows/ci-cd.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/shoplist-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/shoplist-frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t ${{ env.IMAGE_BACKEND }}:${{ env.SHORT_SHA }} app/backend/

      - name: Smoke test — verify dependencies
        run: |
          docker run --rm ${{ env.IMAGE_BACKEND }}:${{ env.SHORT_SHA }} \
            python -c "from flask import Flask; import psycopg2; print('dependencies ok')"

      - name: Push backend image
        run: docker push ${{ env.IMAGE_BACKEND }}:${{ env.SHORT_SHA }}

      - name: Print image reference
        run: echo "Pushed ${{ env.IMAGE_BACKEND }}:${{ env.SHORT_SHA }}"

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        run: |
          docker build -t ${{ env.IMAGE_FRONTEND }}:${{ env.SHORT_SHA }} app/frontend/
          docker push ${{ env.IMAGE_FRONTEND }}:${{ env.SHORT_SHA }}

      - name: Print image reference
        run: echo "Pushed ${{ env.IMAGE_FRONTEND }}:${{ env.SHORT_SHA }}"

  verify-registry:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify both images in registry
        run: |
          docker pull ${{ env.IMAGE_BACKEND }}:${{ env.SHORT_SHA }}
          docker pull ${{ env.IMAGE_FRONTEND }}:${{ env.SHORT_SHA }}
          echo "Both images confirmed in registry at SHA ${{ env.SHORT_SHA }}"

  deploy:
    runs-on: ubuntu-latest
    needs: [verify-registry]
    permissions:
      contents: read

    steps:
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      # No AWS credentials here on purpose — the lab instance already runs minikube
      # from ansible/provision.sh, so a redeploy is just "point the running
      # Deployments at the new image tag" over SSH. No Ansible, no AWS SDK.
      - name: Update running deployment over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            kubectl set image deployment/backend backend=ghcr.io/${{ github.repository_owner }}/shoplist-backend:${{ env.SHORT_SHA }} -n shoplist
            kubectl set image deployment/frontend frontend=ghcr.io/${{ github.repository_owner }}/shoplist-frontend:${{ env.SHORT_SHA }} -n shoplist
            kubectl rollout status deployment/backend -n shoplist --timeout=120s
            kubectl rollout status deployment/frontend -n shoplist --timeout=120s
