---
# Copies the kubernetes/ manifests to the lab instance, points the backend and
# frontend images at ghcr.io:<image_tag>, and applies them in the same order
# used in Lecture 2 (namespace -> postgres -> backend -> frontend).
#
# Run by hand via ansible/provision.sh for the first deploy, and by
# .github/workflows/ci-cd.yml (via `kubectl set image`, not this playbook) for
# every push after that — see the workflow for why the fast path skips re-running
# this whole playbook.
#
# Required extra vars:
#   github_owner   GitHub username/org that owns the ghcr.io images
#   image_tag      tag to deploy (defaults to "latest")

- name: Deploy ShopList to the lab instance
  hosts: shoplist
  become: false
  vars:
    image_tag: latest
    remote_manifest_dir: /tmp/shoplist-kubernetes

  tasks:
    - name: Fail fast if github_owner was not provided
      ansible.builtin.fail:
        msg: "Pass -e github_owner=<your-github-username> when running this playbook"
      when: github_owner is not defined

    - name: Create remote manifest directory
      ansible.builtin.file:
        path: "{{ remote_manifest_dir }}"
        state: directory
        mode: "0755"

    - name: Copy kubernetes manifests
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../kubernetes/"
        dest: "{{ remote_manifest_dir }}/"
        mode: "0644"

    - name: Point backend image at ghcr.io:{{ image_tag }}
      ansible.builtin.replace:
        path: "{{ remote_manifest_dir }}/backend-deployment.yml"
        regexp: "^(\\s*image:\\s*).*$"
        replace: "\\1ghcr.io/{{ github_owner }}/shoplist-backend:{{ image_tag }}"

    - name: Point frontend image at ghcr.io:{{ image_tag }}
      ansible.builtin.replace:
        path: "{{ remote_manifest_dir }}/frontend-deployment.yml"
        regexp: "^(\\s*image:\\s*).*$"
        replace: "\\1ghcr.io/{{ github_owner }}/shoplist-frontend:{{ image_tag }}"

    - name: Apply manifests in dependency order
      ansible.builtin.command: "kubectl apply -f {{ remote_manifest_dir }}/{{ item }}"
      loop:
        - namespace.yml
        - postgres-secret.yml
        - postgres-configmap.yml
        - postgres-pvc.yml
        - postgres-deployment.yml
        - postgres-service.yml
        - backend-deployment.yml
        - backend-service.yml
        - frontend-deployment.yml
        - frontend-service.yml
      changed_when: true

    - name: Wait for backend rollout
      ansible.builtin.command: kubectl rollout status deployment/backend -n shoplist --timeout=120s
      changed_when: false

    - name: Wait for frontend rollout
      ansible.builtin.command: kubectl rollout status deployment/frontend -n shoplist --timeout=120s
      changed_when: false

    - name: Print app URL
      ansible.builtin.debug:
        msg: "ShopList is live at http://{{ ansible_host }}:30080"
