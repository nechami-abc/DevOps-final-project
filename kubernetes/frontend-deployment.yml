apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shoplist
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: registry.gitlab.com/YOUR_GROUP/devops-tikshuv-project/frontend:YOUR_SHA
          imagePullPolicy: Always
          ports:
            - containerPort: 80
